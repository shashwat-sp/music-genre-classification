# Data Configuration
data:
  genres_path: "C:/Users/shash/Downloads/GTZAN/genres_original"
  sample_rate: 22050
  duration: 30.0
  n_mels: 128
  n_fft: 2048
  hop_length: 512
  max_len: 650
  
# Segmentation
segmentation:
  segment_duration: 3.0
  hop_duration: 1.5
  
# Data Splits
splits:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  random_state: 42

# Traditional Models
traditional_models:
  random_forest:
    n_estimators: 300
    max_depth: 20
    min_samples_split: 5
  svm:
    C: 10
    gamma: 'scale'
    kernel: 'rbf'
  knn:
    n_neighbors: 11
    weights: 'distance'
    metric: 'euclidean'
  gradient_boosting:
    n_estimators: 200
    learning_rate: 0.1
    max_depth: 5

# CNN Model
cnn:
  architecture:
    conv_layers: [32, 64, 128, 256]
    kernel_size: 3
    dropout_rate: 0.25
  training:
    batch_size: 64
    epochs: 100
    learning_rate: 0.001
    patience: 15

# Improved CNN (EfficientNet-B0)
improved_cnn:
  backbone: 'efficientnet_b0'
  pretrained: true
  training:
    batch_size: 32
    epochs: 60
    initial_lr: 0.001
    finetune_lr: 0.0002
    weight_decay: 0.0001
    patience: 12
    unfreeze_epoch: 5
    grad_clip: 1.0
  data_augmentation:
    freq_mask_param: 20
    time_mask_param: 40
    prob: 0.5

# Evaluation
evaluation:
  metrics: ['accuracy', 'precision', 'recall', 'f1', 'auc']
  save_figures: true
  figures_dir: 'figures'